name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test with coverage
        run: npm test -- --coverage --runInBand

      - name: Coverage summary
        if: always() && matrix.node-version == 22
        uses: actions/github-script@v7
        with:
          script: |
            const fs = await import('fs');
            const filePath = './coverage/coverage-summary.json';
            if (!fs.existsSync(filePath)) return;
            const summary = JSON.parse(fs.readFileSync(filePath, 'utf8'));
            const { statements, branches, functions, lines } = summary.total;
            const table = [
              '| Metric | Coverage |',
              '|--------|----------|',
              `| Statements | ${statements.pct}% |`,
              `| Branches | ${branches.pct}% |`,
              `| Functions | ${functions.pct}% |`,
              `| Lines | ${lines.pct}% |`,
            ].join('\n');
            await core.summary.addHeading('Coverage Report').addRaw(table).write();
